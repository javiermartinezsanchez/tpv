<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	th:replace="~{plantilla::layout(~{::section})}"><head>
<meta charset="utf-8">
<title>Usuarios</title>
</head>
<body>
<section>
	<div class="container">
		<div class="d-flex justify-content-between align-items-center mb-4">
	        <h1 class="mb-0" th:text="#{comun.lista(#{familia.list})}">Título</h1>
	        <div class="d-flex gap-2">
	            <a th:replace="~{fragments/botones :: btnVolver(${urlBack})}"></a>
	        </div>
	    </div>
	    <div class="form-group">
		  <form th:fragment="formularioFamilia" id="formularioFamilia" class="row g-3 align-items-end mb-4" method="post" 
		  th:action="@{${url}}"
		  th:object="${familia}">		
		  <input type="hidden" th:field="*{id}" />
			<div class="col-md-2">
		        <label class="form-label" th:text="#{familia.nombre}">Título</label>
		        <input type="text" name="nombre" class="form-control"
		               th:value="*{nombre}">
		        <div class="text-danger" th:errors="*{nombre}"></div>       
		    </div>
			<div class="col-md-6">
    <label class="form-label fw-bold" th:text="#{familia.impuesto}">traducir</label>
    <select class="form-select" th:field="*{impuesto.id}">
        <option th:value="${''}" th:text="#{comun.select.any}"></option>
        <option th:each="a : ${impuestos}" th:value="${a.id}" th:text="${a.nombre}"></option>
    </select>
    <div class="text-danger" th:errors="*{impuesto.id}"></div>
		    </div>		
		    <div class="col-md-4 d-flex gap-2">
			    <div th:insert="~{fragments/botones :: btnSubmit(
			        #{command.save},
			        'btn-primary w-100',
			        'bi-save'
			        )}">
	            </div>
            </div>
          </form>
        </div>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th th:text="#{familia.nombre}">default</th>
					<th th:text="#{famlia.impuestop100}">default</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="linea : ${paginacion.contenido}">
					<td th:text="${linea.nombre}">ID</td>
					<td th:text="${linea.impuesto.p100}">ID</td>
					<td><button th:onclick="'cargarDatosFormulario(' + ${linea.id} + ')'" class="btn btn-primary"><i class="bi bi-pencil-square"></i>Editar</button>
				</tr>
			</tbody>
		</table>
        <div th:replace="~{fragments/paginacionComun :: paginador(${paginacion}, '')}"></div>
	</div>
	<script>
		function cargarDatosFormulario(id) {
	    // Hacemos la petición al controlador de Spring Boot
	    fetch('/admin/familia/' + id)
	        .then(response => response.text()) // Convertimos la respuesta a texto/HTML
	        .then(htmlFragmento => {
	            // Reemplazamos el viejo formulario por el nuevo ya relleno
	            document.getElementById('formularioFamilia').innerHTML = htmlFragmento;
	        })
	        .catch(error => console.error('Error al cargar el formulario:', error));
		}
	</script>
</section>
</body>
</html>
